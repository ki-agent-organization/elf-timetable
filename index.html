<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electric Love 2026 – Timetable</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>

/* ── Reset & Base ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Bühnenfarben */
  --mainstage:    #FF3B52;
  --heineken:     #30D158;
  --circus:       #FF9F0A;
  --blueboxx:     #0A84FF;
  --shutdown:     #BF5AF2;
  --hardvalley:   #FF6340;
  --nordic:       #40CBE0;

  --mainstage-l:  rgba(255,59,82,0.18);
  --heineken-l:   rgba(48,209,88,0.16);
  --circus-l:     rgba(255,159,10,0.18);
  --blueboxx-l:   rgba(10,132,255,0.18);
  --shutdown-l:   rgba(191,90,242,0.18);
  --hardvalley-l: rgba(255,99,64,0.18);
  --nordic-l:     rgba(64,203,224,0.16);

  /* Dark Mode Surfaces */
  --bg:       #0A0A0F;
  --surface:  #16161D;
  --surface2: #1E1E28;
  --border:   rgba(255,255,255,0.08);
  --sep:      rgba(255,255,255,0.06);

  --text:     #FFFFFF;
  --text2:    rgba(255,255,255,0.55);
  --text3:    rgba(255,255,255,0.30);

  --hdr-h:   60px;
  --time-w:  60px;
  --stage-h: 52px;
  --col-w:   168px;

  --card-radius: 12px;
  --card-shadow: 0 2px 8px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.06);
}

html, body { height: 100%; background: var(--bg); }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Inter', system-ui, sans-serif;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* ── Nav ──────────────────────────────────────────────────────────────────── */
.nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,15,0.88);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  display: flex; align-items: center;
  padding: 0 20px;
  height: var(--hdr-h);
  border-bottom: 1px solid var(--border);
}

.nav-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  color: white;
  letter-spacing: 3px;
  white-space: nowrap;
  margin-right: 28px;
}

.day-btns { display: flex; gap: 4px; flex: 1; }

.day-btn {
  background: transparent;
  border: none;
  color: var(--text3);
  border-radius: 8px;
  padding: 6px 16px;
  font-family: inherit;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.day-btn:hover { color: var(--text2); }
.day-btn.active { color: white; }

.print-btn {
  margin-left: auto;
  background: rgba(255,255,255,0.07);
  color: var(--text2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 14px;
  font-family: inherit;
  font-weight: 600;
  font-size: 12px;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: all 0.15s;
  white-space: nowrap;
}
.print-btn:hover { background: rgba(255,255,255,0.12); color: white; }

/* ── View-Toggle ───────────────────────────────────────────────────────────── */
.view-toggle {
  display: flex;
  background: rgba(255,255,255,0.06);
  border-radius: 8px;
  overflow: hidden;
  margin-left: 12px;
  flex-shrink: 0;
  border: 1px solid var(--border);
}
.view-toggle-btn {
  background: transparent;
  border: none;
  color: var(--text3);
  padding: 6px 14px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  display: flex; align-items: center; gap: 5px;
  transition: all 0.15s;
}
.view-toggle-btn.active { background: rgba(255,255,255,0.12); color: white; }
.view-toggle-btn:hover  { color: var(--text2); }

/* ── Day section ──────────────────────────────────────────────────────────── */
.day-section { display: none; background: var(--bg); }
.day-section.active { display: block; }

/* ── Day header ───────────────────────────────────────────────────────────── */
.day-header {
  display: flex;
  align-items: flex-end;
  padding: 28px 20px 18px;
  background: var(--bg);
  gap: 14px;
}

.day-header-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 88px;
  line-height: 0.9;
  letter-spacing: -1px;
}
.day-header-date {
  font-size: 15px;
  font-weight: 500;
  color: var(--text2);
  padding-bottom: 8px;
}
.day-header-sub {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 20px;
  color: white;
  margin-bottom: 8px;
}

/* ── Grid ─────────────────────────────────────────────────────────────────── */
.grid-scroll {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0 12px 12px;
}
.grid { display: grid; min-width: max-content; }

/* ── Stage headers ────────────────────────────────────────────────────────── */
.stage-headers { display: contents; }

.time-header {
  position: sticky; left: 0; z-index: 10;
  background: var(--bg);
  width: var(--time-w);
  height: var(--stage-h);
  flex-shrink: 0;
  border-right: 3px solid var(--bg);
}

.stage-header {
  height: var(--stage-h);
  display: flex; align-items: center; justify-content: center;
  text-align: center;
  color: white;
  font-weight: 800;
  font-size: 10px;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  line-height: 1.3;
  padding: 6px 4px;
  width: var(--col-w);
  flex-shrink: 0;
  /* Kein margin — exakt gleich breit wie stage-col */
  border-right: 3px solid var(--bg);
  border-radius: 8px 8px 0 0;
  print-color-adjust: exact;
  -webkit-print-color-adjust: exact;
}

/* ── Grid body ────────────────────────────────────────────────────────────── */
.grid-body { position: relative; display: flex; }

.time-col {
  position: sticky; left: 0; z-index: 5;
  width: var(--time-w);
  flex-shrink: 0;
  background: var(--bg);
  border-right: 3px solid var(--bg);
}

.time-marker {
  position: absolute;
  right: 0; left: 0;
  border-top: 1px solid var(--sep);
  display: flex; align-items: flex-start;
  justify-content: flex-end;
  padding-right: 8px;
}
.time-marker.half { border-top: 1px solid rgba(255,255,255,0.03); }

.time-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  margin-top: -6px;
  white-space: nowrap;
}
.time-marker.half .time-label { display: none; }

/* ── Stage columns ────────────────────────────────────────────────────────── */
.stage-cols { display: flex; flex: 1; }

.stage-col {
  position: relative;
  width: var(--col-w);
  flex-shrink: 0;
  background: var(--bg);
  /* Kein padding — gleiche Breite wie stage-header */
  border-right: 3px solid var(--bg);
}

.hour-band { display: none; }

/* ── Artist blocks ────────────────────────────────────────────────────────── */
.show-block {
  position: absolute;
  left: 2px; right: 5px; /* 5px = 2px gap + 3px border-right of col */
  border-radius: var(--card-radius);
  overflow: hidden;
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 2.5px solid transparent;
  padding: 6px 9px;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  cursor: default;
  box-shadow: var(--card-shadow);
  transition: box-shadow 0.15s, transform 0.12s, background 0.1s;
}
.show-block:hover {
  background: var(--surface2);
  box-shadow: 0 6px 20px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
  transform: translateY(-1px);
}

.show-time {
  font-size: 9px;
  font-weight: 700;
  line-height: 1.2;
  white-space: nowrap;
}
.show-name {
  font-size: 12px;
  font-weight: 700;
  line-height: 1.25;
  color: var(--text);
  margin-top: 2px;
  overflow: hidden;
}

/* ── Legend ───────────────────────────────────────────────────────────────── */
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 18px;
  padding: 14px 20px;
  background: var(--bg);
  border-top: 1px solid var(--border);
}
.legend-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 500; color: var(--text2);
}
.legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

/* ── Footer ───────────────────────────────────────────────────────────────── */
.footer {
  text-align: center;
  padding: 14px;
  font-size: 10px;
  color: var(--text3);
  background: var(--bg);
  letter-spacing: 0.2px;
}

/* ── Sticky stage header row ──────────────────────────────────────────────── */
.stage-header-wrap {
  display: flex;
  background: var(--bg);
}

/* ── Listenansicht ─────────────────────────────────────────────────────────── */
.list-section { display: none; }
.list-section.active { display: block; background: var(--bg); }

.list-sort-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px 8px;
  background: var(--bg);
}
.list-sort-label { font-size: 12px; color: var(--text3); font-weight: 500; }
.sort-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 5px 14px;
  font-size: 12px; font-weight: 600;
  color: var(--text2); cursor: pointer;
  font-family: inherit;
  transition: all 0.12s;
}
.sort-btn.active          { background: white; color: #0A0A0F; border-color: white; }
.sort-btn:not(.active):hover { color: white; }

.list-body-wrap { padding: 4px 16px 40px; }

.list-time-group {
  display: flex; align-items: center; gap: 12px;
  padding: 20px 4px 6px;
  font-size: 11px; font-weight: 700;
  color: var(--text3);
  letter-spacing: 0.8px;
  text-transform: uppercase;
}
.list-time-group::after { content: ''; flex: 1; height: 1px; background: var(--sep); }

.list-stage-group-hdr {
  color: white; font-weight: 800; font-size: 11px;
  padding: 8px 14px; border-radius: 10px;
  margin: 20px 0 4px;
  letter-spacing: 0.6px; text-transform: uppercase;
  print-color-adjust: exact; -webkit-print-color-adjust: exact;
}

/* Dark Inset Grouped List */
.list-group {
  background: var(--surface);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 6px;
  border: 1px solid var(--border);
}

.list-item {
  display: flex; align-items: center;
  background: transparent;
  position: relative;
  transition: background 0.1s;
  min-height: 62px;
}
.list-item + .list-item::before {
  content: '';
  position: absolute;
  left: 58px; right: 0; top: 0;
  height: 1px;
  background: var(--sep);
}
.list-item:hover { background: rgba(255,255,255,0.04); }

.list-item-bar  { width: 5px; min-height: 62px; flex-shrink: 0; align-self: stretch; }
.list-item-body { flex: 1; padding: 12px 16px; }

.list-item-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.list-item-time  { font-size: 12px; font-weight: 600; color: var(--text2); white-space: nowrap; }
.list-item-stage {
  font-size: 10px; font-weight: 700;
  padding: 2px 10px; border-radius: 20px;
  color: white; letter-spacing: 0.3px;
  opacity: 0.9;
}
.list-item-name  { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.2; }

/* ── Responsive Mobile ─────────────────────────────────────────────────────── */
@media (max-width: 680px) {
  .nav {
    flex-wrap: wrap;
    height: auto;
    padding: 10px 14px;
    gap: 8px;
  }
  .nav-title   { font-size: 18px; margin-right: 0; }
  .day-btns    { order: 3; width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
  .day-btn     { padding: 7px 4px; font-size: 12px; text-align: center; }
  .view-toggle { margin-left: auto; }
  .print-btn   { display: none; }

  :root {
    --col-w:   104px;
    --time-w:    0px;
    --stage-h:  44px;
  }
  .time-col         { display: none !important; }
  .time-header      { display: none !important; }
  .time-marker.half { display: none !important; }
  .stage-header     { font-size: 8px; letter-spacing: 0.2px; border-radius: 8px 8px 0 0; }

  .day-header      { padding: 20px 16px 14px; flex-wrap: wrap; gap: 8px; align-items: flex-end; }
  .day-header-name { font-size: 58px; }

  .legend      { padding: 10px 16px; gap: 8px; }
  .legend-item { font-size: 10px; }
  .footer      { padding: 8px 14px; font-size: 9px; }
  .grid-scroll { padding: 0 6px 10px; }

  /* Mobile Grid Cards – dark tinted */
  .show-block {
    border-radius: 10px !important;
    left: 1px !important; right: 4px !important;
    padding: 5px 7px !important;
    background: var(--tint, rgba(255,255,255,0.08)) !important;
    border: none !important;
    box-shadow: none !important;
    border-top-width: 0 !important;
    transform: none !important;
  }
  .show-block:hover { transform: none !important; box-shadow: none !important; }
  .show-time {
    font-size: 9px !important;
    font-weight: 700 !important;
    color: var(--stage-color, rgba(255,255,255,0.6)) !important;
  }
  .show-name {
    font-size: 11px !important;
    font-weight: 700 !important;
    color: white !important;
  }

  /* Mobile Listenansicht – größer, klarer */
  .list-item-name { font-size: 16px !important; }
  .list-item-time { font-size: 13px !important; }
  .list-item-bar  { width: 4px !important; }
  .list-group     { border-radius: 12px; }
}

@media (max-width: 400px) {
  .day-btns { grid-template-columns: repeat(2, 1fr); }
  :root { --col-w: 90px; }
}

/* ── Druck ─────────────────────────────────────────────────────────────────── */
#print-layout { display: none; }

@media print {
  @page { size: A4 landscape; margin: 0; }
  html, body {
    background: white; margin: 0; padding: 0;
    print-color-adjust: exact; -webkit-print-color-adjust: exact;
  }
  .nav          { display: none !important; }
  #app          { display: none !important; }
  #list-app     { display: none !important; }
  #print-layout { display: block !important; }
}

</style>
</head>

// ── Helpers ────────────────────────────────────────────────────────────────
function t2m(t) {
  const [h, m] = t.split(":").map(Number);
  return (h < 6 ? h + 24 : h) * 60 + m;
}
function fmt(t) { return t; }

// ── Build ──────────────────────────────────────────────────────────────────
const PX = 2.5; // px per minute

function buildDay(dayKey) {
  const stages  = STAGES_BY_DAY[dayKey];
  const meta    = DAY_META[dayKey];
  const shows   = SHOWS.filter(s => s[0] === dayKey);
  const mins    = shows.flatMap(s => [t2m(s[2]), t2m(s[3])]);
  const t0      = Math.floor(Math.min(...mins) / 60) * 60;
  const t1      = Math.ceil(Math.max(...mins)  / 60) * 60;
  const totalH  = t1 - t0;           // minutes
  const totalPx = totalH * PX;

  const section = document.createElement('div');
  section.className = 'day-section';
  section.dataset.day = dayKey;

  // Day header
  const hdr = document.createElement('div');
  hdr.className = 'day-header';
  hdr.style.color = meta.accent;
  hdr.style.borderColor = meta.accent;
  hdr.innerHTML = `
    <div class="day-header-name" style="color:${meta.accent}">${meta.label}</div>
    <div class="day-header-date">${meta.date}</div>
    ${meta.sub ? `<div class="day-header-sub" style="background:${meta.accent}">${meta.sub}</div>` : ''}
  `;
  section.appendChild(hdr);

  // Grid scroll
  const scroll = document.createElement('div');
  scroll.className = 'grid-scroll';

  // Stage headers row
  const stageHdrRow = document.createElement('div');
  stageHdrRow.style.cssText = `display:flex; margin-left:${parseInt(getComputedStyle(document.documentElement).getPropertyValue('--time-w')) || 64}px;`;
  // time placeholder
  const timePH = document.createElement('div');
  timePH.style.cssText = `width:64px;flex-shrink:0;`;
  stageHdrRow.appendChild(timePH);

  // Fixed header wrapper
  const headerWrap = document.createElement('div');
  headerWrap.className = 'stage-header-wrap';

  const timeHdrCell = document.createElement('div');
  timeHdrCell.className = 'time-header';
  headerWrap.appendChild(timeHdrCell);

  stages.forEach(stage => {
    const col = document.createElement('div');
    col.className = 'stage-header';
    col.style.background = STAGE_COLOR[stage] || '#555';
    col.textContent = stage;
    headerWrap.appendChild(col);
  });

  // Body
  const body = document.createElement('div');
  body.className = 'grid-body';
  body.style.position = 'relative';

  // Time column
  const timeCol = document.createElement('div');
  timeCol.className = 'time-col';
  timeCol.style.height = totalPx + 'px';

  for (let h = 0; h <= totalH / 60; h++) {
    const tm = t0 + h * 60;
    const y  = h * 60 * PX;
    const mk = document.createElement('div');
    mk.className = 'time-marker';
    mk.style.top = y + 'px';
    mk.style.height = 60 * PX + 'px';
    const lbl = document.createElement('div');
    lbl.className = 'time-label';
    lbl.textContent = String((tm / 60) % 24).padStart(2,'0') + ':00';
    mk.appendChild(lbl);
    timeCol.appendChild(mk);

    // half hour
    if (h < totalH / 60) {
      const mk2 = document.createElement('div');
      mk2.className = 'time-marker half';
      mk2.style.top  = (y + 30 * PX) + 'px';
      const lbl2 = document.createElement('div');
      lbl2.className = 'time-label';
      lbl2.textContent = String((tm / 60) % 24).padStart(2,'0') + ':30';
      mk2.appendChild(lbl2);
      timeCol.appendChild(mk2);
    }
  }
  body.appendChild(timeCol);

  // Stage columns
  const stageCols = document.createElement('div');
  stageCols.className = 'stage-cols';

  stages.forEach(stage => {
    const col = document.createElement('div');
    col.className = 'stage-col';
    col.style.height = totalPx + 'px';

    // shows
    shows.filter(s => s[1] === stage).forEach(([, , start, end, name]) => {
      const tm  = t2m(start);
      const te  = t2m(end);
      const dur = te - tm;
      const top = (tm - t0) * PX;
      const ht  = dur * PX;

      if (top < 0 || ht < 3) return;

      const col_ = STAGE_COLOR[stage] || '#555';
      const lite = STAGE_LIGHT[stage] || '#F5F5F5';

      const blk = document.createElement('div');
      blk.className = 'show-block';
      blk.style.cssText = `
        top:${top + 2}px;
        height:${Math.max(ht - 4, 8)}px;
        border-top-color:${col_};
        --tint:${lite};
        --stage-color:${col_};
      `;

      if (ht > 14) {
        const time = document.createElement('div');
        time.className = 'show-time';
        time.style.color = col_;
        time.textContent = `${start} – ${end}`;
        blk.appendChild(time);
      }

      if (ht > 22) {
        const nm = document.createElement('div');
        nm.className = 'show-name';
        nm.textContent = name;
        blk.appendChild(nm);
      } else if (ht > 10) {
        const nm = document.createElement('div');
        nm.className = 'show-name';
        nm.style.fontSize = '10px';
        nm.textContent = name;
        blk.appendChild(nm);
      }

      col.appendChild(blk);
    });

    stageCols.appendChild(col);
  });

  body.appendChild(stageCols);

  // Stitch together
  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'display:flex;flex-direction:column;';
  wrapper.appendChild(headerWrap);
  wrapper.appendChild(body);
  scroll.appendChild(wrapper);
  section.appendChild(scroll);

  // Legend
  const leg = document.createElement('div');
  leg.className = 'legend';
  stages.forEach(stage => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `
      <div class="legend-dot" style="background:${STAGE_COLOR[stage]||'#555'}"></div>
      ${stage}
    `;
    leg.appendChild(item);
  });
  section.appendChild(leg);

  // Footer
  const foot = document.createElement('div');
  foot.className = 'footer';
  foot.textContent = 'Alle Zeiten CET  •  Daten aus der offiziellen ELF-App  •  Änderungen vorbehalten  •  electriclove.at';
  section.appendChild(foot);

  return section;
}

// ── Ansicht & Tag ──────────────────────────────────────────────────────────
let currentDay = 'do';
let viewMode   = 'grid';

function setView(mode) {
  viewMode = mode;
  document.querySelectorAll('.view-toggle-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.view === mode));
  document.getElementById('app').style.display      = mode === 'grid' ? '' : 'none';
  document.getElementById('list-app').style.display = mode === 'list' ? '' : 'none';
}

function showDay(key) {
  currentDay = key;
  document.querySelectorAll('.day-section, .list-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.day-btn').forEach(b => {
    b.classList.remove('active');
    b.style.background = 'transparent';
    b.style.color      = '';
  });
  const sec     = document.querySelector(`.day-section[data-day="${key}"]`);
  const listSec = document.querySelector(`.list-section[data-day="${key}"]`);
  const btn     = document.querySelector(`.day-btn[data-day="${key}"]`);
  if (sec)     sec.classList.add('active');
  if (listSec) { listSec.classList.add('active'); fillListContent(key, listSort); }
  if (btn) {
    btn.classList.add('active');
    const accent = DAY_META[key].accent;
    btn.style.background = accent;
    btn.style.color      = 'white';
  }
}

// ── Listen-Ansicht ─────────────────────────────────────────────────────────
let listSort = 'time'; // 'time' | 'stage'

function makeListItem([, stage, start, end, name]) {
  const c    = STAGE_COLOR[stage] || '#555';
  const item = document.createElement('div');
  item.className = 'list-item';
  item.innerHTML = `
    <div class="list-item-bar" style="background:${c}"></div>
    <div class="list-item-body">
      <div class="list-item-meta">
        <span class="list-item-time">${start} – ${end}</span>
        <span class="list-item-stage" style="background:${c}">${stage}</span>
      </div>
      <div class="list-item-name">${name}</div>
    </div>
  `;
  return item;
}

function fillListContent(dayKey, sort) {
  const wrap = document.querySelector(`.list-section[data-day="${dayKey}"] .list-body-wrap`);
  if (!wrap) return;
  wrap.innerHTML = '';

  const shows = SHOWS.filter(s => s[0] === dayKey);

  if (sort === 'time') {
    const sorted = shows.slice().sort((a, b) => t2m(a[2]) - t2m(b[2]) || a[1].localeCompare(b[1]));
    const grouped = new Map();
    sorted.forEach(s => {
      if (!grouped.has(s[2])) grouped.set(s[2], []);
      grouped.get(s[2]).push(s);
    });
    grouped.forEach((group, time) => {
      const tg = document.createElement('div');
      tg.className = 'list-time-group';
      tg.textContent = time;
      wrap.appendChild(tg);
      const grp = document.createElement('div');
      grp.className = 'list-group';
      group.forEach(s => grp.appendChild(makeListItem(s)));
      wrap.appendChild(grp);
    });
  } else {
    STAGES_BY_DAY[dayKey].forEach(stage => {
      const stageShows = shows.filter(s => s[1] === stage)
                              .sort((a, b) => t2m(a[2]) - t2m(b[2]));
      if (!stageShows.length) return;
      const hdr = document.createElement('div');
      hdr.className = 'list-stage-group-hdr';
      hdr.style.background = STAGE_COLOR[stage] || '#555';
      hdr.textContent = stage;
      wrap.appendChild(hdr);
      const grp = document.createElement('div');
      grp.className = 'list-group';
      stageShows.forEach(s => grp.appendChild(makeListItem(s)));
      wrap.appendChild(grp);
    });
  }
}

function setListSort(mode) {
  listSort = mode;
  document.querySelectorAll('.sort-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.sort === mode));
  fillListContent(currentDay, mode);
}

  // Sortier-Leiste

  // Inhalts-Container – wird durch fillListContent befüllt
  const wrap = document.createElement('div');
  wrap.className = 'list-body-wrap';
  section.appendChild(wrap);

  return section;
}

// ── Print: dediziertes A4 landscape Layout ────────────────────────────────
function buildPrintDay(dayKey) {
  const stages = STAGES_BY_DAY[dayKey];
  const meta   = DAY_META[dayKey];
  const shows  = SHOWS.filter(s => s[0] === dayKey);

  const mins  = shows.flatMap(s => [t2m(s[2]), t2m(s[3])]);
  const t0    = Math.floor(Math.min(...mins) / 60) * 60;
  const t1    = Math.ceil(Math.max(...mins)  / 60) * 60;
  const total = t1 - t0;

  // A4 landscape in mm
  const PAD    = 7;
  const PAGE_W = 297, PAGE_H = 210;
  const HDR    = 14;   // Tagkopf-Höhe
  const SHDR   = 10;   // Bühnen-Header-Höhe
  const TW     = 13;   // Zeitspalten-Breite
  const INNER_H  = PAGE_H - 2 * PAD;           // 196
  const GRID_H   = INNER_H - HDR - SHDR - 3;   // ~169 (3 mm Puffer unten)
  const GRID_W   = PAGE_W - 2 * PAD - TW;      // 265
  const COL_W    = GRID_W / stages.length;
  const mpm      = GRID_H / total;   // mm pro Minute
  const big      = stages.length <= 3;

  function css(obj) {
    return Object.entries(obj).map(([k,v]) => `${k.replace(/([A-Z])/g,'-$1').toLowerCase()}:${v}`).join(';');
  }

  // ─ Seitenwrapper ─
  const sec = document.createElement('div');
  Object.assign(sec.style, {
    width: PAGE_W + 'mm', height: PAGE_H + 'mm',
    padding: PAD + 'mm',
    boxSizing: 'border-box', position: 'relative',
    pageBreakAfter: 'always', breakAfter: 'page',
    overflow: 'hidden', background: 'white',
    fontFamily: "'Inter',system-ui,sans-serif",
    printColorAdjust: 'exact', WebkitPrintColorAdjust: 'exact',
  });

  // ─ Tagkopf ─
  const hdrEl = document.createElement('div');
  Object.assign(hdrEl.style, {
    height: HDR + 'mm', display: 'flex', alignItems: 'center',
    gap: '4pt', borderBottom: '1.5px solid ' + meta.accent,
    boxSizing: 'border-box', paddingBottom: '2mm',
  });
  hdrEl.innerHTML = `
    <span style="font-family:'Bebas Neue',sans-serif;font-size:18pt;color:${meta.accent};letter-spacing:1px;line-height:1">${meta.label}</span>
    <span style="font-size:8pt;color:#666;font-weight:700;margin-left:2mm">${meta.date}</span>
    ${meta.sub ? `<span style="font-size:6pt;font-weight:700;text-transform:uppercase;padding:1.5px 5px;background:${meta.accent};color:white;border-radius:2px;print-color-adjust:exact;-webkit-print-color-adjust:exact">${meta.sub}</span>` : ''}
    <span style="margin-left:auto;font-size:5.5pt;color:#AAA;font-weight:600;letter-spacing:.4px">ELECTRIC LOVE FESTIVAL 2026 · SALZBURGRING</span>
  `;
  sec.appendChild(hdrEl);

  // ─ Grid-Zeile ─
  const GRID_ROW_H = INNER_H - HDR;  // 182
  const gridRow = document.createElement('div');
  Object.assign(gridRow.style, { display: 'flex', height: GRID_ROW_H + 'mm' });

  // Zeitspalte
  const timeColEl = document.createElement('div');
  Object.assign(timeColEl.style, {
    width: TW + 'mm', flexShrink: '0', position: 'relative',
    paddingTop: SHDR + 'mm', boxSizing: 'border-box',
  });
  for (let h = 0; h <= total / 60; h++) {
    const tm  = t0 + h * 60;
    const top = SHDR + h * 60 * mpm;
    if (top > GRID_ROW_H) break;
    const lbl = document.createElement('div');
    Object.assign(lbl.style, {
      position: 'absolute', top: top + 'mm',
      right: '1.5mm', left: '0', textAlign: 'right',
      fontSize: '6pt', fontWeight: '700', color: '#555',
      transform: 'translateY(-50%)', lineHeight: '1',
    });
    lbl.textContent = String(Math.floor((tm / 60) % 24)).padStart(2,'0') + ':00';
    timeColEl.appendChild(lbl);
  }
  gridRow.appendChild(timeColEl);

  // Bühnen-Bereich
  const stagesEl = document.createElement('div');
  Object.assign(stagesEl.style, {
    display: 'flex', flex: '1', height: GRID_ROW_H + 'mm',
    borderLeft: '1px solid #DDD',
  });

  stages.forEach(stage => {
    const col = document.createElement('div');
    Object.assign(col.style, {
      width: COL_W + 'mm', flexShrink: '0', position: 'relative',
      height: GRID_ROW_H + 'mm', borderRight: '1px solid #E4E4E4',
      boxSizing: 'border-box', overflow: 'hidden',
    });

    // Bühnen-Header
    const sh = document.createElement('div');
    Object.assign(sh.style, {
      height: SHDR + 'mm', background: STAGE_COLOR[stage],
      color: 'white', display: 'flex', alignItems: 'center',
      justifyContent: 'center', textAlign: 'center',
      fontSize: big ? '8pt' : '5.5pt', fontWeight: '700',
      lineHeight: '1.2', padding: '1mm 1mm', boxSizing: 'border-box',
      printColorAdjust: 'exact', WebkitPrintColorAdjust: 'exact',
    });
    sh.textContent = stage;
    col.appendChild(sh);

    // Alternierende Stunden-Bänder
    for (let h = 0; h < total / 60; h++) {
      if (h % 2 === 0) {
        const band = document.createElement('div');
        Object.assign(band.style, {
          position: 'absolute',
          top: (SHDR + h * 60 * mpm) + 'mm',
          left: '0', right: '0',
          height: (60 * mpm) + 'mm',
          background: '#F7F7F7',
        });
        col.appendChild(band);
      }
    }

    // Stundenlinien
    for (let h = 0; h <= total / 60; h++) {
      const top = SHDR + h * 60 * mpm;
      if (top > GRID_ROW_H) break;
      const line = document.createElement('div');
      Object.assign(line.style, {
        position: 'absolute', top: top + 'mm', left: '0', right: '0',
        borderTop: (h % 2 === 0 ? '0.5px solid #C8C8C8' : '0.5px solid #E8E8E8'),
      });
      col.appendChild(line);
    }

    // Künstler-Blöcke
    shows.filter(s => s[1] === stage).forEach(([,, start, end, name]) => {
      const tm    = t2m(start);
      const te    = t2m(end);
      const dur   = te - tm;
      const topMm = SHDR + (tm - t0) * mpm;
      const htMm  = dur * mpm;
      const GAP   = 0.3;
      const c     = STAGE_COLOR[stage] || '#555';
      const bw    = big ? '1.2mm' : '0.9mm';

      if (htMm < 1.5) return;

      const blk = document.createElement('div');
      Object.assign(blk.style, {
        position: 'absolute',
        top: (topMm + GAP) + 'mm',
        left: GAP + 'mm',
        right: GAP + 'mm',
        height: Math.max(htMm - GAP * 2, 2.5) + 'mm',
        background: 'white',
        border: '0.2mm solid rgba(0,0,0,0.09)',
        borderLeft: bw + ' solid ' + c,
        borderRadius: '0.7mm',
        padding: '0.3mm ' + (big ? '1.5mm' : '1mm') + ' 0.3mm ' + (big ? '2mm' : '1.3mm'),
        boxSizing: 'border-box',
        overflow: 'hidden',
        display: 'flex',
        flexDirection: 'column',
        justifyContent: 'flex-start',
        printColorAdjust: 'exact',
        WebkitPrintColorAdjust: 'exact',
        boxShadow: '0 0.15mm 0.5mm rgba(0,0,0,0.09)',
      });

      if (htMm > (big ? 4.5 : 3.5)) {
        const timeEl = document.createElement('div');
        Object.assign(timeEl.style, {
          fontSize: big ? '6.5pt' : '5pt',
          fontWeight: '700', color: c,
          lineHeight: '1.1', whiteSpace: 'nowrap', flexShrink: '0',
        });
        timeEl.textContent = start + '–' + end;
        blk.appendChild(timeEl);
      }

      if (htMm > (big ? 3 : 2.5)) {
        const nameEl = document.createElement('div');
        Object.assign(nameEl.style, {
          fontSize: big ? '7.5pt' : (htMm > 7 ? '6pt' : '5.5pt'),
          fontWeight: '800', color: '#111',
          lineHeight: '1.2', overflow: 'hidden', flexShrink: '0',
        });
        nameEl.textContent = name;
        blk.appendChild(nameEl);
      }

      col.appendChild(blk);
    });

    stagesEl.appendChild(col);
  });

  gridRow.appendChild(stagesEl);
  sec.appendChild(gridRow);

  // Fußzeile
  const foot = document.createElement('div');
  Object.assign(foot.style, {
    position: 'absolute',
    bottom: (PAD - 1) + 'mm', left: PAD + 'mm', right: PAD + 'mm',
    fontSize: '4.5pt', color: '#CCC',
    display: 'flex', justifyContent: 'space-between',
  });
  foot.innerHTML = '<span>Alle Zeiten CET · Änderungen vorbehalten</span>' +
                   '<span>electriclove.at · Daten: offizielle ELF-App</span>';
  sec.appendChild(foot);

  return sec;
}

window.addEventListener('beforeprint', () => {
  const pc = document.getElementById('print-layout');
  pc.innerHTML = '';
  ['mi','do','fr','sa'].forEach(day => pc.appendChild(buildPrintDay(day)));
});

window.addEventListener('afterprint', () => {
  document.getElementById('print-layout').innerHTML = '';
});

// ── Sticky-Kopfzeile: top = echte Nav-Höhe ────────────────────────────────
function updateStickyTop() {
  const h = document.querySelector('.nav').offsetHeight;
  document.querySelectorAll('.stage-header-wrap').forEach(el => el.style.top = h + 'px');
}
window.addEventListener('resize', updateStickyTop);

// ── Init ───────────────────────────────────────────────────────────────────
const app     = document.getElementById('app');
const listApp = document.getElementById('list-app');
['mi','do','fr','sa'].forEach(day => {
  app.appendChild(buildDay(day));
  listApp.appendChild(buildListDay(day));
});
setView(window.innerWidth < 680 ? 'list' : 'grid');
showDay('do');
requestAnimationFrame(updateStickyTop);
</script>
